            loading="lazy"

        <div id="form-fields">

            <div class="form-row">
              <div class="form-group">
                <label for="f-name" data-t="form_name"></label>
                <input type="text" id="f-name" name="name" data-t="form_name" required autocomplete="name" />
              </div>
              <div class="form-group">
                <label for="f-phone" data-t="form_phone"></label>
                <input type="tel" id="f-phone" name="phone" data-t="form_phone" autocomplete="tel" />

            </div>

            <div class="form-group">
              <label for="f-email" data-t="form_email"></label>
              <input type="email" id="f-email" name="email" data-t="form_email" required autocomplete="email" />

            <div class="form-group">

                <option data-t="svc_4_title"></option>
                <option data-t="svc_5_title"></option>

              <textarea id="f-message" name="message" data-t="form_message" rows="4"></textarea>

            <div class="consent-group">
              <input type="checkbox" id="f-consent" name="consent" required />
              <label for="f-consent" data-t="form_consent"></label>
            </div>

            <button type="submit" class="btn btn-primary form-submit-btn" data-t="form_submit"></button>

            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">

          <h3 data-t="form_thanks"></h3>
          <p  data-t="form_thanks_sub"></p>
